<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFM - Asistente IA</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            margin-top: 20px;
            font-size: 14px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .buttons {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #btnAnalizar {
            background-color: #007bff;
            color: white;
        }

        #btnDescargar {
            background-color: #28a745;
            color: white;
        }

        #resultado {
            margin-top: 20px;
            background: #f1f1f1;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Asistente IA</h1>

    <textarea id="prompt" placeholder="Escribe aquí tu prompt..."></textarea>

    <div class="buttons">
        <button id="btnAnalizar">Analizar</button>
        <button id="btnDescargar">Descargar PDF</button>
    </div>

    <div id="resultado">Aquí aparecerá el resultado...</div>
</div>

<script src="app.js"></script>
</body>
</html>
